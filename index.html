<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="hp.css"/>
    <title>HANDPHONE STORE</title>
</head>
<body>

    <nav class="navbar background">
        <ul class="nav-list">
            <div class="logo">
                <img src="/1780404758505.png">
            </div>
            <li><a href="#web">Web Technology</a></li>
            <li><a href="#program">C Programming</a></li>
            <li><a href="#course">Courses</a></li>
        </ul>

        <div class="rightNav">
            <input type="text" name="search" id="search">
            <button class="btn btn-sm">Search</button>
        </div>
    </nav>

    <div class="slider-container">
        <input type="radio" name="slider" id="s1" checked>
        <input type="radio" name="slider" id="s2">

        <div class="slider-wrapper">

            </div>

                <img src="https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=800" alt="Samsung">

            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=800" alt="Pixel">
                <div class="caption">Google Pixel Edition</div>
            </div>
        </div>

        <div class="dots-container">
            <label for="s1" class="dot"></label>
            <label for="s2" class="dot"></label>
            <label for="s3" class="dot"></label>
        </div>
    </div>

    <section class="firstsection">
        <div class="box-main">
            <div class="firstHalf">
                <h1 class="text-big" id="web">Web Technology</h1>
